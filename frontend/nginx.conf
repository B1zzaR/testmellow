server {
    listen 80;
    server_name _;

    # Do not expose the nginx version in Server headers or error pages.
    server_tokens off;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Static assets — long cache, immutable ─────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── HTML entry point — never cache ────────────────────────────────────
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── SPA fallback ──────────────────────────────────────────────────────
    # All routes that don't match a static file are served as index.html so
    # client-side routing (React Router) works on hard refresh.
    #
    # NOTE: /api/* and /webhooks/* are routed directly by Caddy to the Go
    # backend and never reach this container.  Do NOT add proxy_pass blocks
    # here — they will never be hit and create maintenance confusion.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────
    # X-XSS-Protection deliberately omitted: deprecated, removed from Chrome
    # 78+, and historically a source of its own bugs (CVE-2019-5862). CSP
    # supersedes it.
    add_header X-Frame-Options              "DENY"                                        always;
    add_header X-Content-Type-Options       "nosniff"                                     always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"             always;
    # `upgrade-insecure-requests` rewrites any stray http:// resource to
    # https:// before the browser sends the request — defence in depth for
    # legacy code paths that emit hardcoded http:// URLs.
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

    # ── Compression ───────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;
}

