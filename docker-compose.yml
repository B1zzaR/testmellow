services:
  postgres:
    image: postgres:16-alpine
    container_name: vpn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vpn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-vpnplatform}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vpn} -d ${POSTGRES_DB:-vpnplatform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Resource caps so a runaway query / memory leak in any service can't OOM
    # the host and take down everything else (including the postgres-backup
    # cycle on the same host).
    mem_limit: 1g
    cpus: 1.0
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: vpn_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
      --save 1 1
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 384m
    cpus: 0.5
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: deployments/Dockerfile.backend
    container_name: vpn_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      APP_ENV: production
      # Use ${POSTGRES_DB} so the DSN matches what the postgres service creates.
      DATABASE_DSN: postgres://${POSTGRES_USER:-vpn}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vpnplatform}?sslmode=prefer
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PLATEGA_MERCHANT_ID: ${PLATEGA_MERCHANT_ID:?required}
      PLATEGA_SECRET: ${PLATEGA_SECRET:?required}
      PLATEGA_BASE_URL: https://app.platega.io
      PLATEGA_CALLBACK_URL: ${PLATEGA_CALLBACK_URL:?required}
      PLATEGA_WEBHOOK_PATH: /webhooks/platega
      REMNA_BASE_URL: ${REMNA_BASE_URL:?required}
      REMNA_API_KEY: ${REMNA_API_KEY:?required}
      REMNA_SQUAD_UUID: ${REMNA_SQUAD_UUID:-}
      # One-shot bootstrap token that lets the first registrant become admin.
      # Empty after the first admin is in place; promote subsequent admins via SQL.
      ADMIN_BOOTSTRAP_TOKEN: ${ADMIN_BOOTSTRAP_TOKEN:-}
      JWT_ACCESS_TTL_HOURS: ${JWT_ACCESS_TTL_HOURS:-1}
      # NEVER leave ALLOWED_ORIGINS as * in production — config.Load() refuses to start.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      ALLOWED_RETURN_HOSTS: ${ALLOWED_RETURN_HOSTS:-}
      PLATEGA_SECRET_PREV: ${PLATEGA_SECRET_PREV:-}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
    ports:
      - "127.0.0.1:8080:8080"
    # Healthcheck against the /health endpoint so Caddy only receives traffic
    # once the Go process is fully initialised and the DB connection is ready.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    cpus: 1.0
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  worker:
    build:
      context: .
      dockerfile: deployments/Dockerfile.worker
    container_name: vpn_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_DSN: postgres://${POSTGRES_USER:-vpn}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vpnplatform}?sslmode=prefer
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_HOURS: ${JWT_ACCESS_TTL_HOURS:-1}
      PLATEGA_MERCHANT_ID: ${PLATEGA_MERCHANT_ID}
      PLATEGA_SECRET: ${PLATEGA_SECRET}
      PLATEGA_SECRET_PREV: ${PLATEGA_SECRET_PREV:-}
      PLATEGA_BASE_URL: https://app.platega.io
      REMNA_BASE_URL: ${REMNA_BASE_URL}
      REMNA_API_KEY: ${REMNA_API_KEY}
      REMNA_SQUAD_UUID: ${REMNA_SQUAD_UUID:-}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      # Worker has no HTTP server but config.Load() is shared and panics in
      # production when ALLOWED_ORIGINS is '*' or unset. Pass the API value through.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      ADMIN_BOOTSTRAP_TOKEN: ${ADMIN_BOOTSTRAP_TOKEN:-}
    mem_limit: 384m
    cpus: 0.5
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  bot:
    build:
      context: .
      dockerfile: deployments/Dockerfile.bot
    container_name: vpn_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_DSN: postgres://${POSTGRES_USER:-vpn}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vpnplatform}?sslmode=prefer
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:?required}
      # WEBAPP_URL must be set explicitly — defaulting to a hardcoded domain
      # would silently break every other deployment.
      WEBAPP_URL: ${WEBAPP_URL:?WEBAPP_URL is required}
      PLATEGA_MERCHANT_ID: ${PLATEGA_MERCHANT_ID}
      PLATEGA_SECRET: ${PLATEGA_SECRET}
      PLATEGA_SECRET_PREV: ${PLATEGA_SECRET_PREV:-}
      PLATEGA_BASE_URL: https://app.platega.io
      PLATEGA_CALLBACK_URL: ${PLATEGA_CALLBACK_URL}
      REMNA_BASE_URL: ${REMNA_BASE_URL}
      REMNA_API_KEY: ${REMNA_API_KEY}
      REMNA_SQUAD_UUID: ${REMNA_SQUAD_UUID:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_HOURS: ${JWT_ACCESS_TTL_HOURS:-1}
      # ALLOWED_ORIGINS is unused by the bot (no HTTP server) but config.Load()
      # is shared with the API and panics in production when this is '*' or
      # unset. Pass the same value as the API so the bot starts cleanly.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      # Used by the bot when initiating Platega payments via SubscriptionService.
      ALLOWED_RETURN_HOSTS: ${ALLOWED_RETURN_HOSTS:-}
      # Bot doesn't issue admin promotions, but config.Load validates length
      # if non-empty, so pass it through for env consistency.
      ADMIN_BOOTSTRAP_TOKEN: ${ADMIN_BOOTSTRAP_TOKEN:-}
    mem_limit: 256m
    cpus: 0.5
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: vpn_frontend
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      # The nginx alpine image ships wget; / serves the SPA index.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    mem_limit: 128m
    cpus: 0.25
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  pg_backup:
    image: postgres:16-alpine
    container_name: vpn_pg_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # PGPASSWORD must come from the same source as the postgres service so
      # pg_dump authenticates with the right user. POSTGRES_USER and
      # POSTGRES_DB are propagated explicitly — earlier this script silently
      # fell back to defaults `vpn` / `vpnplatform`, which produced 0-byte
      # backups (and rotated out good ones) whenever the operator changed
      # POSTGRES_USER or POSTGRES_DB in .env.
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-vpn}
      POSTGRES_DB: ${POSTGRES_DB:-vpnplatform}
    volumes:
      - pgbackups:/backups
    networks:
      - internal
    # Daily dump, keep last 7 files. The script:
    #   - Writes to a .tmp file first, then renames on success (atomic publish).
    #   - Refuses to keep dumps smaller than 1 KiB (those almost certainly mean
    #     pg_dump failed and gzip wrote an empty stream — silently rotating out
    #     a real backup of yesterday on the next iteration).
    #   - Uses an explicit conditional on pg_dump exit code so the pipe-to-gzip
    #     pattern can't swallow the failure (busybox sh has no pipefail).
    entrypoint: >
      sh -c "
        set -eu;
        while true; do
          TS=$$(date +%Y%m%d_%H%M%S);
          FINAL=/backups/vpnplatform_$${TS}.sql.gz;
          TMP=/backups/.vpnplatform_$${TS}.sql.gz.partial;
          DUMP=/backups/.vpnplatform_$${TS}.sql.partial;
          if pg_dump -h postgres -U \"$${POSTGRES_USER}\" \"$${POSTGRES_DB}\" > $${DUMP}; then
            if gzip -c $${DUMP} > $${TMP}; then
              SIZE=$$(stat -c%s $${TMP} 2>/dev/null || wc -c < $${TMP});
              if [ \"$${SIZE}\" -ge 1024 ]; then
                mv $${TMP} $${FINAL};
                echo \"Backup created: $${FINAL} ($${SIZE} bytes)\";
                ls -tp /backups/vpnplatform_*.sql.gz 2>/dev/null | tail -n +8 | xargs -r rm --;
              else
                echo \"FATAL: backup too small ($${SIZE} bytes), refusing to publish\" >&2;
                rm -f $${TMP};
              fi;
            else
              echo \"FATAL: gzip failed\" >&2;
              rm -f $${TMP};
            fi;
          else
            echo \"FATAL: pg_dump failed\" >&2;
          fi;
          rm -f $${DUMP};
          sleep 86400;
        done
      "
    mem_limit: 256m
    cpus: 0.5

  caddy:
    image: caddy:2-alpine
    container_name: vpn_caddy
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.5
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  pgdata:
  redisdata:
  pgbackups:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge

